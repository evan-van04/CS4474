<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Central - Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/home-screen.css" />
</head>
<body>
  <main class="home-screen">
    <img src="../assets/cloud-left.png" alt="" class="cloud cloud-top-left" />
    <img src="../assets/cloud-group.png" alt="" class="cloud cloud-bottom-left" />
    <img src="../assets/cloud-right.png" alt="" class="cloud cloud-top-right" />

    <section class="hero">
      <div class="title-wrap" aria-label="Spelling Central">
        <img src="../assets/title.png" alt="Spelling Central" class="title-image" />
      </div>

      <a href="input-words.html" class="play-button-link" aria-label="Go to Input Words screen">
        <button class="play-button" type="button">PLAY</button>
      </a>
    </section>

    <img src="../assets/kids-balloon.png" alt="Kids holding balloons" class="kids-balloon" />
  </main>
</body>
</html>
