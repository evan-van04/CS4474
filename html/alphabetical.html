<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Central - Alphabetical</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/alphabetical.css" />
</head>
<body>
  <main class="alphabetical-screen">
    <header class="top-bar">
      <a href="input-words.html" class="nav-button nav-left" aria-label="Go Home">
        <img src="../assets/home.png" alt="" class="nav-icon" />
        <span class="nav-label">HOME</span>
      </a>

      <div class="top-title-wrap">
        <img src="../assets/title.png" alt="Spelling Central" class="top-title-image" />
      </div>

      <button class="nav-button nav-right back-button" type="button" aria-label="Go Back" onclick="history.back()">
        <img src="../assets/back.png" alt="" class="nav-icon" />
        <span class="nav-label">BACK</span>
      </button>
    </header>

    <section class="game-content">
      <img src="../assets/cloud-left.png" alt="" class="cloud cloud-left-mid" />
      <img src="../assets/cloud-right.png" alt="" class="cloud cloud-right-bottom" />

      <section class="game-shell" aria-label="Alphabetical game">
        <h1 class="page-title">Alphabetical</h1>
        <p class="game-instruction" id="gameInstruction">Drag the words into alphabetical order.</p>

        <div class="alphabetical-container">
          <ol class="order-list" id="orderList" aria-label="Alphabetical ordering list"></ol>

          <div class="button-row">
            <button class="reset-button" id="resetButton" type="button">Shuffle</button>
          </div>
        </div>

        <div class="empty-state hidden" id="emptyState">
          <p>No words were found. Please add words on the Input Words page before playing.</p>
          <a class="empty-link" href="input-words.html">Add words now</a>
        </div>
      </section>
    </section>

    <div class="modal-overlay hidden" id="completionModal" aria-hidden="true">
      <div class="error-modal" role="dialog" aria-modal="true" aria-labelledby="completionMessage">
        <img src="../assets/happy-cloud.png" alt="" class="error-cloud" />
        <p class="error-message" id="completionMessage">Awesome job! You put the words in alphabetical order!</p>
        <button class="error-close-button" id="playAgainButton" type="button">PLAY AGAIN</button>
      </div>
    </div>
  </main>

  <script src="../js/alphabetical.js"></script>
</body>
</html>
