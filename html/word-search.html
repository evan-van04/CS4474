<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Central - Word Search</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/word-search.css" />
</head>
<body>
  <main class="word-search-screen">
    <header class="top-bar">
      <a href="input-words.html" class="nav-button nav-left" aria-label="Go Home">
        <img src="../assets/home.png" alt="" class="nav-icon" />
        <span class="nav-label">HOME</span>
      </a>

      <div class="top-title-wrap">
        <img src="../assets/title.png" alt="Spelling Central" class="top-title-image" />
      </div>

      <button class="nav-button nav-right back-button" type="button" aria-label="Go Back" onclick="history.back()">
        <img src="../assets/back.png" alt="" class="nav-icon" />
        <span class="nav-label">BACK</span>
      </button>
    </header>

    <section class="game-content">
      <section class="game-shell" aria-label="Word Search game">
        <h1 class="page-title">Word Search</h1>

        <div class="game-container">
          <div class="grid-section">
            <div id="wordSearchGrid" class="crossword-grid" aria-label="Word search letter grid"></div>
          </div>

          <div class="word-bank-wrapper">
            <div class="word-bank-section">
              <h2 class="word-bank-title">Words</h2>
              <div class="word-bank" id="wordList" aria-live="polite"></div>
            </div>

            <p class="game-instruction" id="gameInstruction">
              Select and drag across letters to find the hidden words!
            </p>
          </div>
        </div>
      </section>
    </section>

    <div class="modal-overlay hidden" id="completionModal" aria-hidden="true">
      <div class="error-modal" role="dialog" aria-modal="true" aria-labelledby="completionMessage">
        <img src="../assets/happy-cloud.png" alt="" class="error-cloud" />
        <p class="error-message" id="completionMessage">Awesome job! You finished the word search!</p>
        <button class="error-close-button" id="playAgainButton" type="button">PLAY AGAIN</button>
      </div>
    </div>
  </main>

  <script src="../js/word-search.js"></script>
</body>
</html>
